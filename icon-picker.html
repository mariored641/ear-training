<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת אייקונים — אלתור בהישג יד</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Special+Elite&family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<style>
:root {
  --wood-darkest: #1a0f08;
  --wood-dark:    #2a1a0d;
  --wood-medium:  #4a2f1a;
  --wood-light:   #6b4423;
  --wood-grain:   #3a2415;
  --brass:        #d4a957;
  --brass-bright: #f0c674;
  --brass-dark:   #8b6914;
  --paper:        #f4ecd8;
  --paper-dark:   #d4c5a0;
  --ink:          #2c1810;
  --leather:      #5c3a1d;
  --glass-bg:     rgba(244, 236, 216, 0.06);
  --glass-border: rgba(212, 169, 87, 0.25);
  --shadow-deep:  0 8px 24px rgba(0,0,0,0.6);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Heebo', system-ui, sans-serif;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(212,169,87,0.08), transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(91,58,29,0.4), transparent 60%),
    linear-gradient(180deg, var(--wood-darkest) 0%, var(--wood-dark) 40%, var(--wood-darkest) 100%);
  color: var(--paper);
  min-height: 100vh;
  padding: 2rem 1.5rem 5rem;
  background-attachment: fixed;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(95deg, transparent 0, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px),
    repeating-linear-gradient(85deg, transparent 0, transparent 7px, rgba(255,255,255,0.015) 7px, rgba(255,255,255,0.015) 8px);
  pointer-events: none;
  z-index: 0;
}
.container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }

header {
  text-align: center;
  margin-bottom: 3rem;
  padding: 2rem;
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(244,236,216,0.04), rgba(0,0,0,0.2));
  box-shadow: var(--shadow-deep), inset 0 1px 0 rgba(255,255,255,0.05);
}
h1 {
  font-family: 'Special Elite', monospace;
  font-size: 2.4rem;
  margin: 0 0 0.5rem;
  color: var(--brass-bright);
  letter-spacing: 0.5px;
}
header p {
  margin: 0.5rem 0;
  color: var(--paper-dark);
  font-size: 1rem;
}
.subtitle { font-family: 'Patrick Hand', cursive; font-size: 1.2rem; color: var(--paper); }

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  justify-content: center;
  margin-top: 1.2rem;
}
.legend span {
  font-size: 0.78rem;
  padding: 0.25rem 0.7rem;
  border-radius: 999px;
  background: rgba(212,169,87,0.12);
  border: 1px solid rgba(212,169,87,0.3);
  color: var(--paper-dark);
}

.section {
  margin-bottom: 3rem;
  padding: 1.5rem;
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(244,236,216,0.025), rgba(0,0,0,0.15));
  box-shadow: var(--shadow-deep);
}
.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1.2rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px dashed rgba(212,169,87,0.3);
}
.section-title {
  font-family: 'Special Elite', monospace;
  font-size: 1.5rem;
  color: var(--brass-bright);
  margin: 0;
}
.section-title small {
  display: block;
  font-family: 'Heebo';
  font-size: 0.85rem;
  color: var(--paper-dark);
  margin-top: 0.2rem;
  letter-spacing: 0.3px;
}
.selected-indicator {
  font-family: 'Patrick Hand', cursive;
  font-size: 1rem;
  color: var(--brass);
  padding: 0.3rem 0.8rem;
  background: rgba(212,169,87,0.1);
  border-radius: 999px;
  border: 1px dashed var(--brass-dark);
}
.selected-indicator.empty { color: var(--paper-dark); opacity: 0.6; }

.icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 0.9rem;
}
.icon-card {
  position: relative;
  background: linear-gradient(180deg, rgba(244,236,216,0.04), rgba(0,0,0,0.1));
  border: 1.5px solid rgba(212,169,87,0.18);
  border-radius: 12px;
  padding: 1.2rem 0.6rem 0.8rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  transition: all 0.18s ease;
  user-select: none;
}
.icon-card:hover {
  border-color: var(--brass);
  transform: translateY(-2px);
  background: linear-gradient(180deg, rgba(212,169,87,0.08), rgba(0,0,0,0.1));
  box-shadow: 0 6px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,169,87,0.3);
}
.icon-card.selected {
  border-color: var(--brass-bright);
  background: linear-gradient(180deg, rgba(212,169,87,0.18), rgba(91,58,29,0.2));
  box-shadow: 0 6px 18px rgba(212,169,87,0.25), inset 0 0 0 2px var(--brass);
}
.icon-card.selected::after {
  content: '✓';
  position: absolute;
  top: 6px;
  left: 8px;
  width: 22px;
  height: 22px;
  background: var(--brass);
  color: var(--wood-darkest);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.85rem;
}
.icon-card iconify-icon,
.icon-card .custom-svg {
  font-size: 3rem;
  width: 3rem;
  height: 3rem;
  color: var(--paper);
  transition: color 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-card .custom-svg svg { width: 100%; height: 100%; }
.icon-card:hover iconify-icon,
.icon-card:hover .custom-svg,
.icon-card.selected iconify-icon,
.icon-card.selected .custom-svg {
  color: var(--brass-bright);
}
.summary-item .custom-svg {
  width: 1.8rem;
  height: 1.8rem;
  color: var(--brass-bright);
  display: flex;
  flex-shrink: 0;
}
.summary-item .custom-svg svg { width: 100%; height: 100%; }
.icon-name {
  font-size: 0.7rem;
  font-family: monospace;
  color: var(--paper-dark);
  text-align: center;
  word-break: break-all;
  line-height: 1.3;
}
.icon-lib {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.15rem 0.55rem;
  border-radius: 999px;
  color: var(--brass-bright);
  background: rgba(212,169,87,0.12);
  border: 1px solid rgba(212,169,87,0.3);
}
.icon-lib[data-license="MIT"] { background: rgba(140, 220, 140, 0.1); border-color: rgba(140, 220, 140, 0.3); color: #b5e8b5; }
.icon-lib[data-license="Apache"] { background: rgba(140, 180, 220, 0.1); border-color: rgba(140, 180, 220, 0.3); color: #b5d4e8; }
.icon-lib[data-license="CC-BY"] { background: rgba(220, 180, 140, 0.1); border-color: rgba(220, 180, 140, 0.3); color: #e8d4b5; }
.icon-lib[data-license="CC0"] { background: rgba(180, 220, 140, 0.1); border-color: rgba(180, 220, 140, 0.3); color: #d4e8b5; }

.icon-card[data-own="true"] {
  background: linear-gradient(180deg, rgba(212,169,87,0.06), rgba(91,58,29,0.12));
  border-color: rgba(212,169,87,0.35);
}
.icon-card[data-own="true"]::before {
  content: '🎨 שלנו';
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 0.6rem;
  background: var(--brass-dark);
  color: var(--paper);
  padding: 0.15rem 0.45rem;
  border-radius: 999px;
  font-family: 'Heebo';
  font-weight: 700;
  letter-spacing: 0.3px;
  opacity: 0.85;
}

.preview-styles {
  display: flex;
  gap: 1rem;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px dashed rgba(212,169,87,0.2);
  flex-wrap: wrap;
}
.preview-style {
  flex: 1;
  min-width: 100px;
  padding: 0.6rem;
  border-radius: 8px;
  text-align: center;
  border: 1px solid rgba(212,169,87,0.15);
  background: rgba(0,0,0,0.15);
}
.preview-style iconify-icon { font-size: 2.5rem; }
.preview-style div { font-size: 0.7rem; color: var(--paper-dark); margin-top: 0.4rem; }

#summary {
  position: fixed;
  bottom: 1rem;
  left: 1rem;
  right: 1rem;
  background: linear-gradient(180deg, rgba(42,26,13,0.95), rgba(26,15,8,0.98));
  backdrop-filter: blur(12px);
  border: 1.5px solid var(--brass);
  border-radius: 14px;
  padding: 1rem 1.5rem;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.7);
  z-index: 100;
  max-width: 1400px;
  margin: 0 auto;
  transition: transform 0.3s ease;
}
#summary.collapsed { transform: translateY(calc(100% - 50px)); }
.summary-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}
.summary-title {
  font-family: 'Special Elite', monospace;
  font-size: 1.1rem;
  color: var(--brass-bright);
  margin: 0;
}
.summary-toggle {
  background: var(--brass);
  color: var(--wood-darkest);
  border: none;
  padding: 0.4rem 0.9rem;
  border-radius: 999px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Heebo';
  font-size: 0.85rem;
}
.summary-body {
  margin-top: 1rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.7rem;
  max-height: 50vh;
  overflow-y: auto;
}
.summary-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.7rem;
  background: rgba(244,236,216,0.05);
  border: 1px solid rgba(212,169,87,0.2);
  border-radius: 8px;
}
.summary-item iconify-icon { font-size: 1.6rem; color: var(--brass-bright); }
.summary-item-text { font-size: 0.78rem; }
.summary-item-text strong { display: block; color: var(--paper); }
.summary-item-text code { color: var(--paper-dark); font-size: 0.7rem; }
.summary-item.empty { opacity: 0.5; }
.summary-item.empty iconify-icon { color: var(--paper-dark); }

#actions {
  display: flex;
  gap: 0.8rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}
button.action {
  padding: 0.5rem 1.1rem;
  background: linear-gradient(180deg, var(--brass-bright), var(--brass-dark));
  color: var(--wood-darkest);
  border: 1px solid var(--brass-dark);
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Heebo';
  font-size: 0.85rem;
  transition: all 0.15s;
}
button.action:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
button.action.secondary {
  background: transparent;
  color: var(--paper);
  border: 1px solid var(--glass-border);
}

.style-filter {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.style-filter button {
  background: transparent;
  border: 1px solid rgba(212,169,87,0.3);
  color: var(--paper-dark);
  padding: 0.35rem 0.8rem;
  border-radius: 999px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: 'Heebo';
  transition: all 0.15s;
}
.style-filter button.active {
  background: var(--brass);
  color: var(--wood-darkest);
  border-color: var(--brass);
  font-weight: 700;
}
.style-filter button:hover:not(.active) { color: var(--brass-bright); border-color: var(--brass); }

#toast {
  position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--brass); color: var(--wood-darkest);
  padding: 0.8rem 1.5rem; border-radius: 999px;
  font-weight: 700; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  opacity: 0; transition: opacity 0.3s; z-index: 200;
  pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>בחירת אייקונים</h1>
    <p class="subtitle">אלתור בהישג יד — ערכת Workshop / Wood Vintage</p>
    <p>כל האייקונים חינמיים, מותרים לשימוש מסחרי. לחץ על אייקון כדי לבחור — תוכל לשנות בכל שלב. הסיכום בתחתית הדף.</p>
    <div class="legend">
      <span>🟢 MIT — חופשי לחלוטין, ללא קרדיט</span>
      <span>🔵 Apache 2.0 — חופשי, ללא קרדיט</span>
      <span>🟡 CC-BY — חופשי, נדרש קרדיט</span>
    </div>
    <div class="style-filter" style="margin-top: 1.4rem">
      <button class="active" data-filter="all">הכל</button>
      <button data-filter="own">🎨 שלנו בלבד</button>
      <button data-filter="line">קווי / מינימליסטי</button>
      <button data-filter="duotone">דו-טון</button>
      <button data-filter="filled">מלא</button>
      <button data-filter="vintage">וינטג' / רף</button>
    </div>
  </header>

  <div id="sections"></div>
</div>

<div id="summary" class="collapsed">
  <div class="summary-header" onclick="document.getElementById('summary').classList.toggle('collapsed')">
    <h3 class="summary-title">🎯 הבחירות שלי (<span id="count">0</span>/13)</h3>
    <button class="summary-toggle">פתח / סגור</button>
  </div>
  <div class="summary-body" id="summary-body"></div>
  <div id="actions">
    <button class="action" onclick="exportJSON()">📋 העתק JSON</button>
    <button class="action secondary" onclick="resetAll()">↺ אפס</button>
    <button class="action secondary" onclick="copySVGUrls()">🔗 העתק כתובות SVG</button>
  </div>
</div>

<div id="toast"></div>

SECTIONS.forEach(s => {
  const own = OWN_VARIANTS[s.id];
  if (own && own.length) {
    s.icons = [
      ...own.map(v => ({ lib: 'own', name: v.name, license: 'MIT', style: ['own','custom'], customSvg: v.svg })),
      ...s.icons,
    ];
  }
});

const STORAGE_KEY = 'icon-picker-selections';
let selections = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let currentFilter = 'all';

function render() {
  const wrap = document.getElementById('sections');
  wrap.innerHTML = '';
  SECTIONS.forEach(section => {
    const sel = selections[section.id];
    const div = document.createElement('div');
    div.className = 'section';
    div.dataset.section = section.id;
    div.innerHTML = `
      <div class="section-header">
        <h2 class="section-title">
          ${section.title}
          <small>${section.subtitle}</small>
        </h2>
        <div class="selected-indicator ${sel ? '' : 'empty'}">
          ${sel ? `נבחר: <code style="color:var(--paper)">${sel.lib}:${sel.name}</code>` : 'לא נבחר עדיין'}
        </div>
      </div>
      <div class="icon-grid">
        ${section.icons.map(ic => renderIcon(section.id, ic, sel)).join('')}
      </div>
    `;
    wrap.appendChild(div);
  });
  applyFilter(currentFilter);
  updateSummary();
}

function renderIcon(sectionId, ic, currentSel) {
  const isSelected = currentSel && currentSel.lib === ic.lib && currentSel.name === ic.name;
  const styles = (ic.style || []).join(' ');
  const display = ic.customSvg
    ? `<div class="custom-svg">${ic.customSvg}</div>`
    : `<iconify-icon icon="${ic.lib}:${ic.name}"></iconify-icon>`;
  const isOwn = ic.lib === 'own';
  return `
    <div class="icon-card ${isSelected ? 'selected' : ''}"
         data-styles="${styles}"
         data-own="${isOwn}"
         onclick="select('${sectionId}', '${ic.lib}', '${ic.name}', '${ic.license}')">
      ${display}
      <div class="icon-name">${ic.lib}:${ic.name}</div>
      <div class="icon-lib" data-license="${ic.license}">${isOwn ? 'MIT · שלנו' : ic.license}</div>
    </div>
  `;
}

function select(sectionId, lib, name, license) {
  selections[sectionId] = { lib, name, license };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(selections));
  render();
  toast(`✓ נשמר: ${lib}:${name}`);
}

function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.style-filter button').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  document.querySelectorAll('.icon-card').forEach(c => {
    if (filter === 'all') { c.style.display = ''; return; }
    const styles = c.dataset.styles || '';
    c.style.display = styles.includes(filter) ? '' : 'none';
  });
}

document.querySelectorAll('.style-filter button').forEach(b => {
  b.addEventListener('click', () => applyFilter(b.dataset.filter));
});

function updateSummary() {
  const body = document.getElementById('summary-body');
  const count = Object.keys(selections).length;
  document.getElementById('count').textContent = count;
  body.innerHTML = SECTIONS.map(s => {
    const sel = selections[s.id];
    if (sel) {
      const fullIcon = s.icons.find(i => i.lib === sel.lib && i.name === sel.name);
      const display = fullIcon && fullIcon.customSvg
        ? `<div class="custom-svg">${fullIcon.customSvg}</div>`
        : `<iconify-icon icon="${sel.lib}:${sel.name}"></iconify-icon>`;
      return `<div class="summary-item">
        ${display}
        <div class="summary-item-text">
          <strong>${s.title}</strong>
          <code>${sel.lib}:${sel.name}</code>
        </div>
      </div>`;
    }
    return `<div class="summary-item empty">
      <iconify-icon icon="ph:question"></iconify-icon>
      <div class="summary-item-text">
        <strong>${s.title}</strong>
        <code>— לא נבחר</code>
      </div>
    </div>`;
  }).join('');
}

function exportJSON() {
  const out = {};
  SECTIONS.forEach(s => {
    out[s.id] = selections[s.id] || null;
  });
  const json = JSON.stringify(out, null, 2);
  navigator.clipboard.writeText(json).then(() => toast('✓ JSON הועתק ללוח'));
}

function copySVGUrls() {
  const urls = [];
  SECTIONS.forEach(s => {
    const sel = selections[s.id];
    if (sel) {
      urls.push(`${s.id}: https://api.iconify.design/${sel.lib}/${sel.name}.svg`);
    }
  });
  navigator.clipboard.writeText(urls.join('\n')).then(() => toast('✓ URLs הועתקו'));
}

function resetAll() {
  if (!confirm('לאפס את כל הבחירות?')) return;
  selections = {};
  localStorage.removeItem(STORAGE_KEY);
  render();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

render();

async function validateIcons() {
  const byLib = {};
  SECTIONS.forEach(s => s.icons.forEach(ic => {
    if (ic.lib === 'custom' || ic.customSvg) return;
    if (!byLib[ic.lib]) byLib[ic.lib] = new Set();
    byLib[ic.lib].add(ic.name);
  }));
  const missing = new Set();
  await Promise.all(Object.entries(byLib).map(async ([lib, names]) => {
    try {
      const list = [...names].join(',');
      const r = await fetch(`https://api.iconify.design/${lib}.json?icons=${encodeURIComponent(list)}`);
      if (!r.ok) return;
      const data = await r.json();
      const found = new Set(Object.keys(data.icons || {}));
      names.forEach(n => { if (!found.has(n)) missing.add(`${lib}:${n}`); });
    } catch (e) {
      console.warn('Validation failed for', lib, e);
    }
  }));
  if (missing.size === 0) return;
  console.log(`Hidden ${missing.size} missing icons:`, [...missing]);
  document.querySelectorAll('.icon-card').forEach(card => {
    const nameEl = card.querySelector('.icon-name');
    if (nameEl && missing.has(nameEl.textContent.trim())) card.style.display = 'none';
  });
  const badge = document.createElement('div');
  badge.style.cssText = 'position:fixed;top:1rem;right:1rem;background:rgba(0,0,0,0.7);color:var(--paper-dark);padding:0.4rem 0.8rem;border-radius:999px;font-size:0.75rem;border:1px solid rgba(212,169,87,0.3);z-index:50;font-family:monospace';
  badge.textContent = `${missing.size} broken icons hidden`;
  badge.title = [...missing].join('\n');
  document.body.appendChild(badge);
  setTimeout(() => badge.style.opacity = '0.4', 3000);
}
validateIcons();
</script>
</body>
</html>
