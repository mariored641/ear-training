name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - claude/build-apk-export-yq8Mb
    paths:
      - '.github/workflows/build-android-apk.yml'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle (Vite)
        run: npm run build

      - name: Install Capacitor CLI for android platform setup
        run: |
          npm install --no-save @capacitor/cli@^8.0.2 @capacitor/android@^8.0.2

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor (copy web assets into android project)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "Found APK at: $APK_PATH"
          ls -lh "$APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ear-training-debug-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
